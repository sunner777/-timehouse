upstream timehouse_backend {
    least_conn;
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name api.timehouse.top;
    return 301 https://$server_name$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name api.timehouse.top;

    ssl_certificate     /etc/letsencrypt/live/api.timehouse.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.timehouse.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    # 速率限制（zone 在 nginx.conf http 块中定义）
    limit_req zone=api_limit burst=20 nodelay;

    client_max_body_size 10m;

    # Gzip
    gzip on;
    gzip_types application/json text/plain;

    location / {
        proxy_pass http://timehouse_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # 健康检查端点（无需认证，减小日志噪音）
    location /api/v1/health {
        proxy_pass http://timehouse_backend;
        proxy_set_header Host $host;
        access_log off;
    }
}
